<html>
<head>
    <title>for...in/for</title>
</head>
<body>

    <script>
	//for...in(parcourir les propriétés d'un objet)
	let personne ={nom:"Ali",age:25};
	for(let clé in personne) {console.log(clé +":"+personne[clé]);}
	
	//for...of(parcourir les elements d'un tableau)
	let fruits =["Pomme","Banane","Orange"];
	for(let fd of fruits) {console.log(fd);}
    </script>

</body>
</html>
